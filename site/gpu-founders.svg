<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" fill="none">
  <defs>
    <!-- Card body gradient — brushed titanium -->
    <linearGradient id="body" x1="0" y1="0" x2="520" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="35%" stop-color="#28282e"/>
      <stop offset="50%" stop-color="#1e1e24"/>
      <stop offset="70%" stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#141418"/>
    </linearGradient>

    <!-- Shroud accent gradient -->
    <linearGradient id="shroud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a44"/>
      <stop offset="50%" stop-color="#22222a"/>
      <stop offset="100%" stop-color="#3a3a44"/>
    </linearGradient>

    <!-- Fan blade gradient -->
    <linearGradient id="fan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a32"/>
      <stop offset="100%" stop-color="#18181e"/>
    </linearGradient>

    <!-- Purple accent glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- PCB edge gradient -->
    <linearGradient id="pcb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3a0a"/>
      <stop offset="100%" stop-color="#062806"/>
    </linearGradient>

    <!-- Metallic highlight -->
    <linearGradient id="metalHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#55555e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9898a4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#55555e" stop-opacity="0"/>
    </linearGradient>

    <!-- Backplate gradient -->
    <linearGradient id="backplate" x1="0" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a30"/>
      <stop offset="40%" stop-color="#34343a"/>
      <stop offset="100%" stop-color="#22222a"/>
    </linearGradient>

    <!-- Filter for subtle inner shadow -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="shifted"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="shadow" operator="in"/>
    </filter>

    <!-- Outer glow for the whole card -->
    <filter id="cardGlow" x="-15%" y="-20%" width="130%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.55 0 0.2 0 0
                0.36 0 0.1 0 0
                0.96 0 0.5 0 0
                0    0 0   0.12 0"/>
    </filter>
  </defs>

  <!-- Ambient purple glow behind card -->
  <ellipse cx="260" cy="150" rx="240" ry="120" fill="url(#glow)" opacity="0.5"/>

  <!-- === CARD BODY === -->
  <g transform="translate(30, 20)">
    <!-- Backplate (top edge visible) -->
    <rect x="20" y="2" width="430" height="8" rx="1" fill="url(#backplate)" opacity="0.7"/>

    <!-- Main shroud body -->
    <rect x="10" y="8" width="450" height="200" rx="4" fill="url(#body)" stroke="#3a3a44" stroke-width="0.8"/>

    <!-- Brushed metal texture lines -->
    <g opacity="0.06" stroke="#d8d8e0" stroke-width="0.3">
      <line x1="10" y1="30" x2="460" y2="30"/>
      <line x1="10" y1="50" x2="460" y2="50"/>
      <line x1="10" y1="70" x2="460" y2="70"/>
      <line x1="10" y1="90" x2="460" y2="90"/>
      <line x1="10" y1="110" x2="460" y2="110"/>
      <line x1="10" y1="130" x2="460" y2="130"/>
      <line x1="10" y1="150" x2="460" y2="150"/>
      <line x1="10" y1="170" x2="460" y2="170"/>
      <line x1="10" y1="190" x2="460" y2="190"/>
    </g>

    <!-- Diagonal V-cut design element (Founders Edition signature) -->
    <path d="M 230 8 L 180 108 L 230 208" stroke="#3a3a44" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M 232 8 L 282 108 L 232 208" stroke="#3a3a44" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Left shroud panel -->
    <rect x="10" y="8" width="170" height="200" rx="4" fill="url(#shroud)" opacity="0.15"/>

    <!-- SVG animation for fan spin -->
    <style>
      @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      .fan-left { animation: spinCW 3s linear infinite; transform-origin: 150px 128px; }
      .fan-right { animation: spinCCW 3s linear infinite; transform-origin: 380px 128px; }
    </style>

    <!-- === LEFT FAN === -->
    <g transform="translate(120, 108)">
      <!-- Fan housing ring -->
      <circle r="78" fill="none" stroke="#2a2a32" stroke-width="3"/>
      <circle r="76" fill="#0e0e12" opacity="0.8"/>
      <circle r="74" fill="none" stroke="#22222a" stroke-width="1"/>
    </g>

    <!-- Left fan blades (spinning) -->
    <g class="fan-left" opacity="0.7">
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4"/>
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(51.4,120,108)"/>
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(102.8,120,108)"/>
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(154.3,120,108)"/>
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(205.7,120,108)"/>
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(257.1,120,108)"/>
      <path d="M 120,100 Q 150,38 128,36 Q 110,48 120,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(308.6,120,108)"/>
    </g>

    <!-- Left fan center hub -->
    <g transform="translate(120, 108)">
      <circle r="12" fill="#1a1a20" stroke="#3a3a44" stroke-width="1"/>
      <circle r="5" fill="#22222a"/>
      <!-- NVIDIA logo hint (stylized eye) -->
      <path d="M -3.5,0 C -3.5,-2.5 -1.5,-4 0.5,-4 C 2,-4 3.5,-2 3.5,0 C 3.5,2 2,4 0.5,4 C -1.5,4 -3.5,2.5 -3.5,0 Z" fill="none" stroke="#76e651" stroke-width="0.8" opacity="0.8"/>
    </g>

    <!-- === RIGHT FAN === -->
    <g transform="translate(350, 108)">
      <!-- Fan housing ring -->
      <circle r="78" fill="none" stroke="#2a2a32" stroke-width="3"/>
      <circle r="76" fill="#0e0e12" opacity="0.8"/>
      <circle r="74" fill="none" stroke="#22222a" stroke-width="1"/>
    </g>

    <!-- Right fan blades (spinning opposite) -->
    <g class="fan-right" opacity="0.7">
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4"/>
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(51.4,350,108)"/>
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(102.8,350,108)"/>
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(154.3,350,108)"/>
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(205.7,350,108)"/>
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(257.1,350,108)"/>
      <path d="M 350,100 Q 320,38 342,36 Q 360,48 350,100" fill="#28282e" stroke="#3a3a44" stroke-width="0.4" transform="rotate(308.6,350,108)"/>
    </g>

    <!-- Right fan center hub -->
    <g transform="translate(350, 108)">
      <circle r="12" fill="#1a1a20" stroke="#3a3a44" stroke-width="1"/>
      <circle r="5" fill="#22222a"/>
    </g>

    <!-- Metallic highlight strip -->
    <rect x="10" y="104" width="450" height="1.5" fill="url(#metalHi)" opacity="0.3"/>

    <!-- === PCB EDGE (bottom) === -->
    <rect x="20" y="208" width="430" height="12" fill="url(#pcb)" rx="1"/>
    <!-- PCB gold contacts -->
    <g fill="#b8962e" opacity="0.6">
      <rect x="140" y="212" width="16" height="5" rx="0.5"/>
      <rect x="160" y="212" width="16" height="5" rx="0.5"/>
      <rect x="180" y="212" width="16" height="5" rx="0.5"/>
      <rect x="200" y="212" width="16" height="5" rx="0.5"/>
      <rect x="220" y="212" width="16" height="5" rx="0.5"/>
      <rect x="240" y="212" width="16" height="5" rx="0.5"/>
      <rect x="260" y="212" width="16" height="5" rx="0.5"/>
      <rect x="280" y="212" width="16" height="5" rx="0.5"/>
      <rect x="300" y="212" width="16" height="5" rx="0.5"/>
      <rect x="320" y="212" width="16" height="5" rx="0.5"/>
    </g>

    <!-- === BRACKET (left side I/O) === -->
    <rect x="0" y="4" width="12" height="216" rx="2" fill="#2a2a30" stroke="#3a3a44" stroke-width="0.5"/>
    <!-- I/O ports -->
    <g fill="#0e0e12" stroke="#3a3a44" stroke-width="0.5">
      <!-- HDMI -->
      <rect x="2" y="20" width="8" height="14" rx="1"/>
      <!-- DP ports -->
      <rect x="2" y="42" width="8" height="12" rx="1"/>
      <rect x="2" y="60" width="8" height="12" rx="1"/>
      <rect x="2" y="78" width="8" height="12" rx="1"/>
    </g>
    <!-- Bracket screw holes -->
    <circle cx="6" cy="12" r="2" fill="none" stroke="#55555e" stroke-width="0.5"/>
    <circle cx="6" cy="210" r="2" fill="none" stroke="#55555e" stroke-width="0.5"/>

    <!-- === POWER CONNECTOR (top right) === -->
    <g transform="translate(380, 0)">
      <rect x="0" y="-6" width="50" height="10" rx="2" fill="#1e1e24" stroke="#3a3a44" stroke-width="0.5"/>
      <g fill="#b8962e" opacity="0.5">
        <rect x="6" y="-3" width="3" height="4" rx="0.5"/>
        <rect x="12" y="-3" width="3" height="4" rx="0.5"/>
        <rect x="18" y="-3" width="3" height="4" rx="0.5"/>
        <rect x="24" y="-3" width="3" height="4" rx="0.5"/>
        <rect x="30" y="-3" width="3" height="4" rx="0.5"/>
        <rect x="36" y="-3" width="3" height="4" rx="0.5"/>
        <rect x="42" y="-3" width="3" height="4" rx="0.5"/>
      </g>
    </g>

    <!-- "GeForce RTX" text on shroud -->
    <text x="235" y="56" font-family="'Space Grotesk', system-ui, sans-serif" font-size="9" font-weight="600"
          letter-spacing="3" fill="#55555e" text-anchor="middle" opacity="0.6">GEFORCE RTX</text>

    <!-- Subtle NVIDIA green accent line -->
    <line x1="198" y1="62" x2="272" y2="62" stroke="#76e651" stroke-width="0.6" opacity="0.25"/>

    <!-- Heat sink fins visible between fans -->
    <g stroke="#2a2a32" stroke-width="0.6" opacity="0.4">
      <line x1="200" y1="40" x2="200" y2="176"/>
      <line x1="204" y1="36" x2="204" y2="180"/>
      <line x1="208" y1="33" x2="208" y2="183"/>
      <line x1="212" y1="30" x2="212" y2="186"/>
      <line x1="216" y1="28" x2="216" y2="188"/>
      <line x1="220" y1="26" x2="220" y2="190"/>
      <line x1="224" y1="24" x2="224" y2="192"/>
      <line x1="228" y1="22" x2="228" y2="194"/>
      <line x1="232" y1="20" x2="232" y2="196"/>
      <line x1="236" y1="20" x2="236" y2="196"/>
      <line x1="240" y1="22" x2="240" y2="194"/>
      <line x1="244" y1="24" x2="244" y2="192"/>
      <line x1="248" y1="26" x2="248" y2="190"/>
      <line x1="252" y1="28" x2="252" y2="188"/>
      <line x1="256" y1="30" x2="256" y2="186"/>
      <line x1="260" y1="33" x2="260" y2="183"/>
      <line x1="264" y1="36" x2="264" y2="180"/>
      <line x1="268" y1="40" x2="268" y2="176"/>
    </g>
  </g>

  <!-- Purple accent reflection on bottom -->
  <ellipse cx="260" cy="248" rx="180" ry="8" fill="#8b5cf6" opacity="0.06"/>
</svg>
