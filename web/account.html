<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Settings — Bare Metal AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080a; --surface: #0e0e12; --surface2: #141418;
  --border: #22222a; --border-hi: #3a3a44;
  --silver: #d8d8e0; --silver-dim: #9898a4; --silver-dark: #55555e;
  --purple: #8b5cf6; --purple-dim: rgba(139,92,246,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Space Grotesk', system-ui, sans-serif; background: var(--bg); color: var(--silver); }
.header { display: flex; align-items: center; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
.logo { font-size: 16px; font-weight: 800; letter-spacing: 3px; text-decoration: none;
  background: linear-gradient(180deg, #f0f0f0 0%, #a8a8b0 25%, #d0d0d8 50%, #808088 75%, #c0c0c8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.back { margin-left: 16px; color: var(--silver-dim); text-decoration: none; font-size: 18px; }
.back:hover { color: var(--purple); }
.spacer { flex: 1; }

.content { max-width: 600px; margin: 0 auto; padding: 40px 24px; }
.section { margin-bottom: 32px; }
.section-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--silver-dim); margin-bottom: 16px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--silver-dim); margin-bottom: 4px; letter-spacing: 0.5px; }
.field input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--silver); font-family: inherit; font-size: 14px; outline: none; }
.field input:focus { border-color: var(--purple); }

.btn { font-size: 12px; padding: 8px 16px; border: 1px solid var(--border-hi); background: transparent; color: var(--silver-dim); cursor: pointer; font-family: inherit; letter-spacing: 1px; text-transform: uppercase; clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%); }
.btn:hover { color: var(--silver); border-color: var(--silver-dim); }
.btn.primary { background: var(--purple); border-color: var(--purple); color: white; }

/* API keys */
.key-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.key-item .key-prefix { font-family: 'Consolas', monospace; color: var(--purple); font-size: 13px; }
.key-item .key-name { font-size: 13px; color: var(--silver); flex: 1; }
.key-item .key-date { font-size: 11px; color: var(--silver-dark); }
.key-item .key-revoke { font-size: 11px; color: #f43f5e; cursor: pointer; }

.new-key-display { background: var(--surface); border: 1px solid var(--purple); padding: 12px 16px; margin: 12px 0; font-family: 'Consolas', monospace; font-size: 13px; color: var(--purple); word-break: break-all; }
.new-key-warn { font-size: 12px; color: #eab308; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <a class="logo" href="/app">BareMetalRT</a>
  <a class="back" href="/app">&larr;</a>
  <span class="spacer"></span>
</div>

<div class="content">
  <div class="section">
    <div class="section-title">Profile</div>
    <div class="field">
      <label>First Name</label>
      <input type="text" id="first-name" placeholder="First name">
    </div>
    <div class="field">
      <label>Last Name</label>
      <input type="text" id="last-name" placeholder="Last name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" disabled>
    </div>
    <button class="btn primary" onclick="saveProfile()">Save</button>
    <span id="save-status" style="margin-left:12px; font-size:12px; color:#22c55e;"></span>
  </div>

  <div class="section">
    <div class="section-title">Linked Devices</div>
    <p style="font-size:13px; color:var(--silver-dim); margin-bottom:12px;">GPUs linked to your account. Unlinking revokes the device's API key.</p>
    <div id="devices-list"></div>
  </div>

  <div class="section">
    <div class="section-title">API Keys</div>
    <p style="font-size:13px; color:var(--silver-dim); margin-bottom:12px;">Use API keys to connect your daemon or access the inference API programmatically.</p>
    <div id="keys-list"></div>
    <div id="new-key-area"></div>
    <button class="btn primary" onclick="generateKey()" style="margin-top:12px;">Generate New Key</button>
  </div>

  <div class="section">
    <div class="section-title">Danger Zone</div>
    <button class="btn" onclick="if(confirm('Sign out of all devices?'))logoutAll()" style="border-color:#f43f5e; color:#f43f5e;">Sign Out All Devices</button>
  </div>
</div>

<script>
let user = null;
let isDemo = false;

async function init() {
  const r = await fetch('/auth/me');
  if (!r.ok) { window.location = '/app'; return; }
  user = await r.json();
  isDemo = user.email === 'demo@baremetalrt.ai';
  document.getElementById('first-name').value = user.first_name || '';
  document.getElementById('last-name').value = user.last_name || '';
  document.getElementById('email').value = user.email || '';
  if (isDemo) {
    document.getElementById('first-name').disabled = true;
    document.getElementById('last-name').disabled = true;
    document.querySelectorAll('.btn.primary').forEach(b => {
      b.disabled = true; b.style.opacity = '0.35'; b.style.cursor = 'default';
      b.title = 'Not available in demo mode';
      b.onclick = null;
    });
    document.querySelectorAll('.btn').forEach(b => {
      if (b.style.borderColor === '#f43f5e' || b.style.color === '#f43f5e') {
        b.disabled = true; b.style.opacity = '0.35'; b.style.cursor = 'default';
        b.title = 'Not available in demo mode';
        b.onclick = null;
      }
    });
  }
  loadKeys();
  loadDevices();
}

async function saveProfile() {
  if (isDemo) return;
  const r = await fetch('/auth/me', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      first_name: document.getElementById('first-name').value,
      last_name: document.getElementById('last-name').value,
    }),
  });
  if (r.ok) document.getElementById('save-status').textContent = 'Saved!';
  setTimeout(() => document.getElementById('save-status').textContent = '', 2000);
}

async function loadKeys() {
  const r = await fetch('/api/keys');
  if (!r.ok) return;
  const d = await r.json();
  const list = document.getElementById('keys-list');
  list.innerHTML = '';
  for (const k of (d.keys || [])) {
    if (k.revoked) continue;
    const item = document.createElement('div');
    item.className = 'key-item';
    const revokeHtml = isDemo ? '' : `<span class="key-revoke" onclick="revokeKey('${k.id}')">Revoke</span>`;
    item.innerHTML = `
      <span class="key-prefix">${k.key_prefix}...</span>
      <span class="key-name">${k.name}</span>
      <span class="key-date">${new Date(k.created_at).toLocaleDateString()}</span>
      ${revokeHtml}
    `;
    list.appendChild(item);
  }
}

async function generateKey() {
  if (isDemo) return;
  const r = await fetch('/api/keys', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: 'api-key-' + Date.now() }),
  });
  if (!r.ok) return;
  const d = await r.json();
  document.getElementById('new-key-area').innerHTML = `
    <div class="new-key-display">${d.key}</div>
    <div class="new-key-warn">Copy this key now — it won't be shown again.</div>
  `;
  loadKeys();
}

async function revokeKey(id) {
  if (isDemo) return;
  if (!confirm('Revoke this API key?')) return;
  await fetch(`/api/keys/${id}`, { method: 'DELETE' });
  loadKeys();
}

async function loadDevices() {
  const r = await fetch('/api/devices');
  if (!r.ok) return;
  const d = await r.json();
  const list = document.getElementById('devices-list');
  list.innerHTML = '';
  if (!d.devices || d.devices.length === 0) {
    list.innerHTML = '<div style="font-size:13px; color:var(--silver-dark);">No devices linked. Install the daemon and it will auto-link.</div>';
    return;
  }
  for (const dev of d.devices) {
    const item = document.createElement('div');
    item.className = 'key-item';
    const vram = dev.gpu_vram_mb ? Math.round(dev.gpu_vram_mb / 1024) + 'GB' : '';
    const status = dev.status === 'online' ? '<span style="color:#22c55e;">online</span>' : '<span style="color:var(--silver-dark);">offline</span>';
    const seen = dev.last_seen ? new Date(dev.last_seen).toLocaleDateString() : '';
    const unlinkHtml = isDemo ? '' : `<span class="key-revoke" onclick="unlinkDevice('${dev.node_id}')">Unlink</span>`;
    item.innerHTML = `
      <span class="key-prefix" style="min-width:140px;">${dev.gpu_name || 'Unknown GPU'}</span>
      <span class="key-name">${dev.hostname || ''} ${vram ? '· ' + vram : ''}</span>
      <span class="key-date">${status} ${seen ? '· ' + seen : ''}</span>
      ${unlinkHtml}
    `;
    list.appendChild(item);
  }
}

async function unlinkDevice(nodeId) {
  if (isDemo) return;
  if (!confirm('Unlink this device? It will need to be re-linked to use your account.')) return;
  await fetch(`/api/devices/${nodeId}`, { method: 'DELETE' });
  loadDevices();
  loadKeys();
}

async function logoutAll() {
  await fetch('/auth/logout', { method: 'POST' });
  window.location = '/app';
}

init();
</script>
</body>
</html>
